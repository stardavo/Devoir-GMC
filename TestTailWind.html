<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestTailWind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="#" class="text-2xl font-bold text-indigo-600">MonSite</a>
      <ul class="flex gap-8 text-sm font-medium">
        <li><a href="#accueil" class="hover:text-indigo-600 transition-colors duration-200">Accueil</a></li>
        <li><a href="#services" class="hover:text-indigo-600 transition-colors duration-200">Services</a></li>
        <li><a href="#contact" class="hover:text-indigo-600 transition-colors duration-200">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <main id="accueil" class="flex-1 flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-700 text-white">
    <div class="text-center px-6 py-28">
      <h1 class="text-5xl md:text-6xl font-extrabold mb-6 leading-tight drop-shadow-lg">
        Bienvenu sur mon site
      </h1>
      <p class="text-lg md:text-xl text-indigo-100 mb-10 max-w-xl mx-auto">
        Découvrez ce que je propose et n'hésitez pas à me contacter.
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="#contact"
           class="px-8 py-3 bg-white text-indigo-600 font-semibold rounded-full shadow-lg hover:bg-indigo-50 transition-colors duration-200">
          En savoir plus
        </a>
        <a href="#services"
           class="px-8 py-3 border-2 border-white text-white font-semibold rounded-full hover:bg-white hover:text-indigo-600 transition-colors duration-200">
          Services
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-300">
    <div class="max-w-6xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-3 gap-10">

      <!-- Branding -->
      <div>
        <h2 class="text-white text-xl font-bold mb-3">MonSite</h2>
        <p class="text-sm text-gray-400">Simple, moderne et efficace.</p>
      </div>

      <!-- Liens du menu -->
      <div>
        <h3 class="text-white font-semibold mb-4">Navigation</h3>
        <ul class="space-y-2 text-sm">
          <li><a href="#accueil" class="hover:text-white transition-colors duration-200">Accueil</a></li>
          <li><a href="#services" class="hover:text-white transition-colors duration-200">Services</a></li>
          <li><a href="#contact" class="hover:text-white transition-colors duration-200">Contact</a></li>
        </ul>
      </div>

      <!-- Réseaux sociaux -->
      <div>
        <h3 class="text-white font-semibold mb-4">Réseaux sociaux</h3>
        <div class="flex gap-3">

          <!-- Facebook -->
          <a href="#" aria-label="Facebook"
             class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-700 hover:bg-blue-600 transition-colors duration-200">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
              <path d="M22 12a10 10 0 1 0-11.563 9.876v-6.988H7.9V12h2.537V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.888h-2.33v6.988A10.003 10.003 0 0 0 22 12z"/>
            </svg>
          </a>

          <!-- Twitter / X -->
          <a href="#" aria-label="Twitter / X"
             class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-700 hover:bg-sky-500 transition-colors duration-200">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </a>

          <!-- Instagram -->
          <a href="#" aria-label="Instagram"
             class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-700 hover:bg-pink-500 transition-colors duration-200">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.308.975.975 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.334 2.633-1.308 3.608-.975.975-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.334-3.608-1.308-.975-.975-1.246-2.242-1.308-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.334-2.633 1.308-3.608C4.516 2.497 5.783 2.226 7.15 2.163 8.416 2.105 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.332.014 7.052.072 5.197.157 3.355.673 2.014 2.014.673 3.355.157 5.197.072 7.052.014 8.332 0 8.741 0 12c0 3.259.014 3.668.072 4.948.085 1.855.601 3.697 1.942 5.038 1.341 1.341 3.183 1.857 5.038 1.942C8.332 23.986 8.741 24 12 24s3.668-.014 4.948-.072c1.855-.085 3.697-.601 5.038-1.942 1.341-1.341 1.857-3.183 1.942-5.038C23.986 15.668 24 15.259 24 12s-.014-3.668-.072-4.948c-.085-1.855-.601-3.697-1.942-5.038C20.645.673 18.803.157 16.948.072 15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
            </svg>
          </a>

          <!-- LinkedIn -->
          <a href="#" aria-label="LinkedIn"
             class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-700 hover:bg-blue-700 transition-colors duration-200">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>

        </div>
      </div>
    </div>

    <div class="border-t border-gray-700 text-center text-xs text-gray-500 py-4">
      &copy; 2026 MonSite. Tous droits réservés.
    </div>
  </footer>

</body>
</html>
